<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Analytics Demo</title>

  <script src="https://cdn.amplitude.com/script/7b98da1f2c304b91ca59ad7998093b41.js"></script><script>window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));window.amplitude.init('7b98da1f2c304b91ca59ad7998093b41', {"fetchRemoteConfig":true,"autocapture":true});</script>

    <style>
        body{
            font-family: Arial, sans-serif;
            max-width:800px;
            margin:60px auto;
            padding:20px;
            text-align:center;
            background:#f7f9fc;
        }

        h1{
            color:#1f2937;
        }

        p{
            color:#555;
            font-size:18px;
            line-height:1.5;
        }

        .button{
            display:inline-block;
            margin:15px;
            padding:15px 30px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        .button:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<h1>Understand Your Users Better</h1>

<p>
Turn product usage into actionable insights with event tracking,
funnels, and behavioral analytics.
</p>

<button class="button" id="signupBtn">
    Sign Up
</button>

<button class="button" id="demoBtn">
    Request Demo
</button>

<script>
document.getElementById("signupBtn").addEventListener("click", function() {
    amplitude.track("CTA Clicked", {
        cta_name: "Sign Up",
        page_name: "Product Analytics Demo",
        button_location: "Hero Section"
    });
    alert("Sign Up clicked");
});

document.getElementById("demoBtn").addEventListener("click", function() {
    amplitude.track("CTA Clicked", {
        cta_name: "Request Demo",
        page_name: "Product Analytics Demo",
        button_location: "Hero Section"
    });
    alert("Request Demo clicked");
});
</script>

</body>
</html>
